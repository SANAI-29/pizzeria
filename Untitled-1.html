<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пиццерия Bella Pizza</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; overflow-x: hidden; }
        
        .banner {
            height: 100vh;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 50%, #ff8e53 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            overflow: hidden;
        }
        
        .pizza-svg {
            width: 300px;
            height: 300px;
            position: absolute;
            top: 20%;
            left: 10%;
            animation: float 6s ease-in-out infinite;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.3));
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        
        .content {
            z-index: 2;
            max-width: 800px;
            padding: 0 20px;
        }
        
        h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: slideIn 1s ease-out;
        }
        
        .tagline {
            font-size: 1.5rem;
            margin-bottom: 30px;
            opacity: 0.9;
            animation: slideIn 1s ease-out 0.3s both;
        }
        
        .cta-button {
            display: inline-block;
            background: #ff4757;
            color: white;
            padding: 15px 40px;
            font-size: 1.3rem;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255,71,87,0.4);
            animation: slideIn 1s ease-out 0.6s both;
        }
        
        .cta-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(255,71,87,0.6);
            background: #ff3742;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .steam {
            position: absolute;
            top: 15%;
            left: 15%;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, transparent 70%);
            border-radius: 50%;
            animation: steamRise 3s infinite linear;
        }
        
        .steam:nth-child(2) { animation-delay: 1s; left: 18%; top: 12%; }
        .steam:nth-child(3) { animation-delay: 2s; left: 12%; top: 18%; }
        
        @keyframes steamRise {
            0% { opacity: 0; transform: translateY(0) scale(0.5); }
            50% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-100px) scale(1.2); }
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .pizza-svg { width: 200px; height: 200px; }
            .tagline { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="banner">
        <!-- Анимированная SVG пицца -->
        <svg class="pizza-svg" viewBox="0 0 300 300">
            <!-- Корж -->
            <circle cx="150" cy="150" r="130" fill="#f5c518" stroke="#d4a017" stroke-width="8"/>
            <!-- Соус -->
            <circle cx="150" cy="150" r="100" fill="#d63031" opacity="0.9"/>
            <!-- Сыр -->
            <circle cx="150" cy="150" r="85" fill="#f39c12" opacity="0.8"/>
            <!-- Пепперони -->
            <circle cx="100" cy="120" r="12" fill="#c0392b"/>
            <circle cx="200" cy="110" r="15" fill="#c0392b"/>
            <circle cx="130" cy="180" r="10" fill="#c0392b"/>
            <circle cx="170" cy="190" r="13" fill="#c0392b"/>
            <circle cx="80" cy="140" r="11" fill="#c0392b"/>
            <circle cx="220" cy="160" r="14" fill="#c0392b"/>
            <!-- Оливки -->
            <ellipse cx="140" cy="100" rx="8" ry="5" fill="#2d3436"/>
            <ellipse cx="210" cy="130" rx="7" ry="4" fill="#2d3436"/>
            <!-- Грибы -->
            <path d="M90 200 Q100 180 110 200 Q105 210 100 205 Q95 210 90 200 Z" fill="#e17055"/>
            <path d="M220 170 Q230 150 240 170 Q235 180 230 175 Q225 180 220 170 Z" fill="#e17055"/>
        </svg>
        
        <!-- Пар от пиццы -->
        <div class="steam"></div>
        <div class="steam"></div>
        <div class="steam"></div>
        
        <div class="content">
            <h1>🍕 Bella Pizza</h1>
            <p class="tagline">Самая вкусная пицца в городе! Горячая, хрустящая, с настоящими ингредиентами</p>
            <a href="#menu" class="cta-button">Заказать сейчас</a>
        </div>
    </div>
</body>
</html>
